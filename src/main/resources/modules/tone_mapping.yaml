name: "render_pipeline.module.tone_mapping.name"
inputImageConfigs:
  - name: "denoised_radiance"
    format: "R16G16B16A16_SFLOAT"
outputImageConfigs:
  - name: "mapped_output"
    format: "R16G16B16A16_SFLOAT"
attributeConfigs:
  - name: "render_pipeline.module.tone_mapping.attribute.method"
    type: "enum:render_pipeline.module.tone_mapping.attribute.method.pbr_neutral-render_pipeline.module.tone_mapping.attribute.method.reinhard-render_pipeline.module.tone_mapping.attribute.method.reinhard_white_point-render_pipeline.module.tone_mapping.attribute.method.aces-render_pipeline.module.tone_mapping.attribute.method.aces_white_point-render_pipeline.module.tone_mapping.attribute.method.uncharted2"
    value: "render_pipeline.module.tone_mapping.attribute.method.pbr_neutral"
  - name: "render_pipeline.module.tone_mapping.attribute.middle_grey"
    type: "float_range:0.0-1.0"
    value: "0.18"
  - name: "render_pipeline.module.tone_mapping.attribute.exposure_up_speed"
    type: "float_range:0.1-20.0"
    value: "8.0"
  - name: "render_pipeline.module.tone_mapping.attribute.exposure_down_speed"
    type: "float_range:0.1-20.0"
    value: "8.0"
  - name: "render_pipeline.module.tone_mapping.attribute.log2_luminance_min"
    type: "float_range:-24.0-0.0"
    value: "-12.0"
  - name: "render_pipeline.module.tone_mapping.attribute.log2_luminance_max"
    type: "float_range:0.0-24.0"
    value: "4.0"
  - name: "render_pipeline.module.tone_mapping.attribute.low_percent"
    type: "float_range:0.0-1.0"
    value: "0.005"
  - name: "render_pipeline.module.tone_mapping.attribute.high_percent"
    type: "float_range:0.0-1.0"
    value: "0.99"
  - name: "render_pipeline.module.tone_mapping.attribute.min_exposure"
    type: "float_range:0.0-8.0"
    value: "0.01"
  - name: "render_pipeline.module.tone_mapping.attribute.max_exposure"
    type: "float_range:0.0-8.0"
    value: "2.0"
  - name: "render_pipeline.module.tone_mapping.attribute.enable_auto_exposure"
    type: "bool"
    value: "render_pipeline.true"
  - name: "render_pipeline.module.tone_mapping.attribute.exposure_metering_mode"
    type: "enum:render_pipeline.module.tone_mapping.attribute.exposure_metering_mode.global-render_pipeline.module.tone_mapping.attribute.exposure_metering_mode.center"
    value: "render_pipeline.module.tone_mapping.attribute.exposure_metering_mode.center"
  - name: "render_pipeline.module.tone_mapping.attribute.center_metering_percent"
    type: "float_range:1.0-100.0"
    value: "20.0"
  - name: "render_pipeline.module.tone_mapping.attribute.manual_exposure"
    type: "float_range:0.0-8.0"
    value: "1.0"
  - name: "render_pipeline.module.tone_mapping.attribute.exposure_bias"
    type: "float_range:-8.0-8.0"
    value: "0.0"
  - name: "render_pipeline.module.tone_mapping.attribute.white_point"
    type: "float_range:0.0-64.0"
    value: "32.0"
  - name: "render_pipeline.module.tone_mapping.attribute.saturation"
    type: "float_range:0.0-3.0"
    value: "1.0"
  - name: "render_pipeline.module.tone_mapping.attribute.clamp_output"
    type: "bool"
    value: "render_pipeline.true"
